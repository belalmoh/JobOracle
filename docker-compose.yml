version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: joboracle-db
    environment:
      POSTGRES_USER: joboracle
      POSTGRES_PASSWORD: joboracle
      POSTGRES_DB: joboracle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joboracle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: